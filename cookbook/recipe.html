<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="stylesheet" href="./static/style/recipe_style.css">
</head>
<body>
    <header>
        <div class="menu">
            <div class="head_content">
                <img src="./static/media/logo.svg" alt="logo" class="logo">
                <div class="search">
                    <input type="text" placeholder="Поиск рецепта.." id="searchInput">
                    <a href="#" id="searchButton"><img src="./static/media/lupa.svg" alt="lupa" class="lupa"></a>
                </div>
                <div class="pages">
                    <a href="index.html" class="name_page">Рецепты</a>
                    <button class="sign_in">Войти</button>
                </div>
            </div>
        </div>
    </header>    
    <main>
        <div class="content">
            <div class="list">
                <img src="./static/media/puncake.svg" alt="image recipe" class="title_image">
                <div class="for_all_activity">
                    <button><img src="./static/media/favorite.svg" alt="favorite" class="button_favorite"></button>
                </div>
                <div class="description">
                    <p class="name_recipe" id="recipeTitle"></p>
                    <p class="description_recipe" id="recipeDescription"></p>
                </div>
                <div class="for_igredients">
                    <p class="title">Ингредиенты</p>
                    <div class="all_ingredients" id="ingredientsList">
                    </div>
                </div>
                <div class="for_steps">
                    <p class="title">Рецепт</p>
                    <div class="all_steps" id="stepsContainer">
                    </div>
                </div>
            </div>
            <div class="list_for_comments">
                <div class="caption">
                    <p class="title_comment">Комментарии</p>
                    <p class="count_comm">(115)</p>
                </div>
                <div class="stars_reviews">
                    <img src="./static/media/goldenStar.svg" alt="star" class="golden_star">
                    <p class="avg_reviews">4.5</p>
                </div>
                <div class="all_comments">
                </div>
                <div class="for_you_comment">
                    <div class="for_stars">
                        <p class="title_comment">Напишите ваш отзыв</p>
                        <div class="all_stars">
                            <img src="./static/media/no_comment.svg" alt="grey star" class="greyStar" data-value="1">
                            <img src="./static/media/no_comment.svg" alt="grey star" class="greyStar" data-value="2">
                            <img src="./static/media/no_comment.svg" alt="grey star" class="greyStar" data-value="3">
                            <img src="./static/media/no_comment.svg" alt="grey star" class="greyStar" data-value="4">
                            <img src="./static/media/no_comment.svg" alt="grey star" class="greyStar" data-value="5">
                        </div>
                    </div>
                    <input type="text" placeholder="Ввести комментарий..." class="input_comment">
                    <button class="send">Отправить</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="main_footer">
            <div class="footer_content">
                <div class="top">
                    <img src="./static/media/logo.svg" alt="logo" class="logo_footer">
                    <div class="column">
                        <p class="text_page">Рецепты</p>
                        <p class="text_page">Профиль</p>
                    </div>
                    <div class="column">
                        <p class="text_page">Любимое</p>
                        <p class="text_page">Мои рецепты</p>
                    </div>
                </div>
                <div class="bottom">
                    <p class="prava">© 2026 Харченко К.А.</p>
                </div>
            </div>
        </div>
    </footer>
    <script type="module" src="./static/js/header.js"></script>
    <script type="module" src="./static/js/recipe.js"></script>
</body>
</html>
