<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./static/style/login.css">
</head>
<body>
    <div class="content">
        <div class="head">
            <a href="index.html"><img src="./static/media/arrow.svg" alt="arrowBack" id="arrowBack"></a>
            <h1>Авторизация</h1>
        </div>
        <div class="for_input">
            <input type="text" placeholder="Введите имя" id="loginName">
            <p class="fail" id="nameFail">Неверное имя пользователя</p>
        </div>
        <div class="for_input">
            <input type="email" placeholder="Введите email" id="loginEmail">
            <p class="fail" id="emailFail">Неверная почта</p>
        </div>
        <div class="for_input">
            <input type="password" placeholder="Введите пароль" id="loginPassword">
            <p class="fail" id="passwordFail">Неверный пароль</p>
        </div>
        <button class="sign_in" id="loginBtn">Войти</button>
    </div>
    <script type="module" src="./static/js/login.js"></script>
</body>
</html>
